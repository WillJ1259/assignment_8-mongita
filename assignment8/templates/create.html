{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto; display:block;">
    <h2>Create a New Book</h2>

    <form action="{{ url_for('create_post') }}" method="POST">
        <label>Title:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required>
            {% for cat in categories %}
                <option value="{{ cat['categoryId'] }}">{{ cat['categoryName'] }}</option>
            {% endfor %}
        </select><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" placeholder="example.jpg" required><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" required>
            <option value="0">0</option>
            <option value="1">1</option>
        </select><br><br>

        <button type="submit">Submit</button>
        <a class="actionButton" href="{{ url_for('read_books') }}" style="display:inline-block; width:auto; padding:0 10px;">Cancel</a>
    </form>
</main>
{% endblock %}
